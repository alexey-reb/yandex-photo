<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио моделей</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
        }
        
        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        
        .model-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
            color: #333;
        }
        
        .model-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }
        
        .model-photo {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
            border-bottom: 5px solid #667eea;
        }
        
        .model-info {
            padding: 25px;
        }
        
        .model-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 15px;
            min-height: 60px;
            display: flex;
            align-items: center;
        }
        
        .model-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .stat {
            text-align: center;
            flex: 1;
            min-width: 80px;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: #667eea;
            display: block;
            line-height: 1;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }
        
        .model-id {
            background: #e2e8f0;
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: #4a5568;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .status-active {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 40px 0;
        }
        
        .btn {
            padding: 12px 30px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            font-size: 1rem;
            text-decoration: none;
        }
        
        .btn-primary {
            background: white;
            color: #667eea;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }
        
        footer {
            text-align: center;
            margin-top: 60px;
            padding: 30px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }
        
        .tech-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            margin: 0 5px;
        }
        
        @media (max-width: 768px) {
            .models-grid {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .model-photo {
                height: 350px;
            }
        }
        
        .photo-placeholder {
            width: 100%;
            height: 400px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }
        
        .error-message {
            background: rgba(254, 178, 178, 0.9);
            color: #742a2a;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Школа моделей</h1>
            <div class="subtitle">Портфолио учеников • Фото с Яндекс.Облака</div>
        </header>
        
        <div class="controls">
            <button class="btn btn-primary" onclick="loadModels()">
                <i class="fas fa-sync-alt"></i> Обновить
            </button>
            <button class="btn btn-secondary" onclick="showAllPhotos()">
                <i class="fas fa-images"></i> Все фото
            </button>
        </div>
        
        <div id="models-container">
            <!-- Модели загружаются сюда -->
        </div>
        
        <footer>
            <p>Система работает без API — данные встроены в HTML</p>
            <div style="margin-top: 20px;">
                <span class="tech-badge">
                    <i class="fas fa-cloud"></i> Яндекс.Облако
                </span>
                <span class="tech-badge">
                    <i class="fab fa-html5"></i> HTML5
                </span>
                <span class="tech-badge">
                    <i class="fab fa-js"></i> JavaScript
                </span>
                <span class="tech-badge">
                    <i class="fab fa-github"></i> GitHub Pages
                </span>
            </div>
        </footer>
    </div>

    <!-- Font Awesome для иконок -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <script>
        // ==============================================
        // ДАННЫЕ МОДЕЛЕЙ (встроены прямо в HTML)
        // ==============================================
        
        const modelsData = [
            {
                id: 1,
                name: "Анна Петрова",
                telegram: "@anna_model",
                height: 178,
                weight: 55,
                grade: 5,
                status: "active",
                // Фото с Яндекс.Облака
                photos: [
                    "https://storage.yandexcloud.net/alexreb/model1.jpg",
                    "https://storage.yandexcloud.net/alexreb/photo1.jpg",
                    "https://storage.yandexcloud.net/alexreb/model2.jpg"
                ],
                description: "Специализация: fashion-съемки. Опыт: 2 года."
            },
            {
                id: 2,
                name: "Мария Иванова",
                telegram: "@maria_model",
                height: 175,
                weight: 53,
                grade: 4,
                status: "active",
                photos: [
                    "https://storage.yandexcloud.net/alexreb/model2.jpg",
                    "https://storage.yandexcloud.net/alexreb/photo1.jpg"
                ],
                description: "Специализация: коммерческая реклама."
            },
            {
                id: 3,
                name: "Елена Сидорова",
                telegram: "@elena_model",
                height: 180,
                weight: 58,
                grade: 5,
                status: "active",
                photos: [
                    "https://storage.yandexcloud.net/alexreb/photo1.jpg",
                    "https://storage.yandexcloud.net/alexreb/model1.jpg"
                ],
                description: "Специализация: beauty-съемки."
            }
        ];
        
        // ==============================================
        // ФУНКЦИИ ОТОБРАЖЕНИЯ
        // ==============================================
        
        function loadModels() {
            const container = document.getElementById('models-container');
            
            if (!modelsData || modelsData.length === 0) {
                container.innerHTML = `
                    <div class="error-message">
                        <h3><i class="fas fa-exclamation-triangle"></i> Нет данных</h3>
                        <p>Добавьте данные в переменную modelsData</p>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="models-grid">';
            
            modelsData.forEach(model => {
                // Основное фото (первое в массиве или резервное)
                const mainPhoto = model.photos && model.photos[0] 
                    ? model.photos[0] 
                    : 'https://storage.yandexcloud.net/alexreb/photo1.jpg';
                
                html += `
                <div class="model-card">
                    <div class="photo-container">
                        <img src="${mainPhoto}" 
                             alt="${model.name}" 
                             class="model-photo"
                             onerror="handleImageError(this, ${model.id})">
                    </div>
                    
                    <div class="model-info">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px;">
                            <h2 class="model-name">${model.name}</h2>
                            <span class="model-id">
                                <i class="fas fa-fingerprint"></i> #${model.id}
                            </span>
                        </div>
                        
                        <p style="color: #4a5568; margin-bottom: 20px; line-height: 1.5;">
                            ${model.description || 'Профессиональная модель школы.'}
                        </p>
                        
                        <div class="model-stats">
                            <div class="stat">
                                <span class="stat-value">${model.height}</span>
                                <span class="stat-label">Рост (см)</span>
                            </div>
                            <div class="stat">
                                <span class="stat-value">${model.grade}/5</span>
                                <span class="stat-label">Оценка</span>
                            </div>
                            <div class="stat">
                                <span class="stat-value">${model.weight}</span>
                                <span class="stat-label">Вес (кг)</span>
                            </div>
                        </div>
                        
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                            <span class="status status-active">
                                <i class="fas fa-circle"></i> Активна
                            </span>
                            <span style="color: #718096; font-size: 0.9rem;">
                                <i class="fab fa-telegram"></i> ${model.telegram}
                            </span>
                        </div>
                        
                        <!-- Дополнительные фото (если есть) -->
                        ${model.photos && model.photos.length > 1 ? `
                        <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #e2e8f0;">
                            <p style="color: #718096; font-size: 0.9rem; margin-bottom: 10px;">
                                <i class="fas fa-images"></i> Ещё фото (${model.photos.length - 1}):
                            </p>
                            <div style="display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px;">
                                ${model.photos.slice(1).map(photo => `
                                    <img src="${photo}" 
                                         alt="Дополнительное фото" 
                                         style="width: 60px; height: 60px; object-fit: cover; border-radius: 8px; cursor: pointer;"
                                         onclick="showPhotoInLightbox('${photo}', '${model.name}')"
                                         onerror="this.style.display='none'">
                                `).join('')}
                            </div>
                        </div>
                        ` : ''}
                    </div>
                </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
            
            // Показываем статистику
            showStats();
        }
        
        function handleImageError(imgElement, modelId) {
            console.warn('Ошибка загрузки фото для модели', modelId);
            
            // Пробуем резервные фото
            const backupPhotos = [
                'https://storage.yandexcloud.net/alexreb/photo1.jpg',
                'https://storage.yandexcloud.net/alexreb/model1.jpg',
                'https://storage.yandexcloud.net/alexreb/model2.jpg'
            ];
            
            let currentIndex = 0;
            
            function tryNextPhoto() {
                if (currentIndex < backupPhotos.length) {
                    imgElement.src = backupPhotos[currentIndex];
                    currentIndex++;
                } else {
                    // Если все резервные фото не загрузились
                    imgElement.parentElement.innerHTML = `
                        <div class="photo-placeholder">
                            <div style="text-align: center;">
                                <i class="fas fa-user" style="font-size: 3rem; margin-bottom: 10px;"></i>
                                <p>Фото недоступно</p>
                            </div>
                        </div>
                    `;
                }
            }
            
            imgElement.onerror = tryNextPhoto;
            tryNextPhoto();
        }
        
        function showStats() {
            const totalPhotos = modelsData.reduce((sum, model) => {
                return sum + (model.photos ? model.photos.length : 0);
            }, 0);
            
            console.log(`Всего моделей: ${modelsData.length}`);
            console.log(`Всего фото: ${totalPhotos}`);
            console.log('Данные загружены из Яндекс.Облака');
        }
        
        function showAllPhotos() {
            const container = document.getElementById('models-container');
            
            let allPhotos = [];
            modelsData.forEach(model => {
                if (model.photos) {
                    model.photos.forEach(photo => {
                        allPhotos.push({
                            url: photo,
                            modelName: model.name,
                            modelId: model.id
                        });
                    });
                }
            });
            
            if (allPhotos.length === 0) {
                container.innerHTML = '<p class="error-message">Нет доступных фото</p>';
                return;
            }
            
            let html = `
                <div style="text-align: center; margin-bottom: 30px;">
                    <h2 style="color: white; margin-bottom: 10px;">Все фото (${allPhotos.length})</h2>
                    <button class="btn btn-secondary" onclick="loadModels()">
                        <i class="fas fa-arrow-left"></i> Назад к моделям
                    </button>
                </div>
                
                <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;">
            `;
            
            allPhotos.forEach((photo, index) => {
                html += `
                    <div style="background: white; border-radius: 12px; overflow: hidden; cursor: pointer;"
                         onclick="showPhotoInLightbox('${photo.url}', '${photo.modelName}')">
                        <img src="${photo.url}" 
                             alt="${photo.modelName}" 
                             style="width: 100%; height: 250px; object-fit: cover;"
                             onerror="this.src='https://storage.yandexcloud.net/alexreb/photo1.jpg'">
                        <div style="padding: 15px;">
                            <p style="color: #4a5568; font-weight: 600; margin-bottom: 5px;">${photo.modelName}</p>
                            <p style="color: #718096; font-size: 0.9rem;">Фото ${index + 1}</p>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }
        
        function showPhotoInLightbox(photoUrl, title) {
            // Создаем lightbox
            const lightbox = document.createElement('div');
            lightbox.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0, 0, 0, 0.95);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                cursor: pointer;
            `;
            
            lightbox.innerHTML = `
                <div style="position: relative; max-width: 90%; max-height: 90%;">
                    <img src="${photoUrl}" 
                         alt="${title}" 
                         style="max-width: 100%; max-height: 80vh; border-radius: 10px;"
                         onerror="this.src='https://storage.yandexcloud.net/alexreb/photo1.jpg'">
                    <div style="position: absolute; bottom: -50px; left: 0; right: 0; text-align: center; color: white;">
                        <h3>${title}</h3>
                        <p>${photoUrl}</p>
                    </div>
                    <div style="position: absolute; top: -50px; right: 0; color: white; font-size: 2rem; cursor: pointer;"
                         onclick="this.parentElement.parentElement.remove()">
                        <i class="fas fa-times"></i>
                    </div>
                </div>
            `;
            
            lightbox.onclick = function(e) {
                if (e.target === this) {
                    this.remove();
                }
            };
            
            document.body.appendChild(lightbox);
        }
        
        // ==============================================
        // ЗАГРУЗКА ПРИ СТАРТЕ
        // ==============================================
        document.addEventListener('DOMContentLoaded', loadModels);
        
        // Проверка загрузки фото
        window.addEventListener('load', function() {
            console.log('Страница загружена. Проверяем фото с Яндекс.Облака...');
            
            // Проверяем доступность фото
            const testPhotos = [
                'https://storage.yandexcloud.net/alexreb/photo1.jpg',
                'https://storage.yandexcloud.net/alexreb/model1.jpg',
                'https://storage.yandexcloud.net/alexreb/model2.jpg'
            ];
            
            testPhotos.forEach(url => {
                const img = new Image();
                img.onload = function() {
                    console.log(`✅ Фото доступно: ${url}`);
                };
                img.onerror = function() {
                    console.warn(`❌ Фото недоступно: ${url}`);
                };
                img.src = url;
            });
        });
    </script>
</body>
</html>
