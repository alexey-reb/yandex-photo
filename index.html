<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Модель</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Masonry без библиотек: колонками (очень просто и работает везде) */
    .masonry {
      column-gap: 1rem;
      column-count: 1;
    }
    @media (min-width: 576px) { .masonry { column-count: 2; } }
    @media (min-width: 992px) { .masonry { column-count: 3; } }
    @media (min-width: 1200px){ .masonry { column-count: 4; } }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 1rem;
    }

    .masonry img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      background: #f3f3f3;
    }

    .photo-card {
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 .25rem .75rem rgba(0,0,0,.05);
      background: #fff;
    }

    .hero {
      background: radial-gradient(1200px 600px at 20% 10%, rgba(13,110,253,.12), transparent 60%),
                  radial-gradient(1200px 600px at 80% 0%, rgba(32,201,151,.10), transparent 55%),
                  #0b1220;
      color: #fff;
    }
    .hero .muted { color: rgba(255,255,255,.70); }

    .spec dt { color: #6c757d; font-weight: 500; }
    .spec dd { margin-bottom: .5rem; }

    .tag { cursor: default; }

    /* В модалке картинка адаптивная */
    .modal-img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      background: #f3f3f3;
    }
  </style>
</head>

<body class="bg-body-tertiary">

  <!-- HERO -->
  <header class="hero py-5">
    <div class="container">
      <div class="d-flex flex-column flex-md-row align-items-md-end justify-content-between gap-3">
        <div>
          <a href="./index.html" class="text-decoration-none text-white-50 small">← Назад к списку</a>
          <h1 id="name" class="display-6 mb-1 mt-2">Модель</h1>
          <div id="subtitle" class="muted"></div>
        </div>
        <div class="text-md-end">
          <div id="meta" class="small text-white-50"></div>
        </div>
      </div>
    </div>
  </header>

  <main class="container my-4">
    <div id="error" class="alert alert-danger d-none"></div>

    <div class="row g-4">
      <!-- LEFT: анкета -->
      <aside class="col-12 col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <h2 class="h6 mb-3">Параметры</h2>

            <dl class="spec row mb-0">
              <dt class="col-5">ID</dt>
              <dd class="col-7" id="id"></dd>

              <dt class="col-5">Возраст</dt>
              <dd class="col-7" id="age"></dd>

              <dt class="col-5">Рост</dt>
              <dd class="col-7" id="height"></dd>

              <dt class="col-5">Город</dt>
              <dd class="col-7" id="city"></dd>
            </dl>

            <hr>

            <div id="bioWrap" class="d-none">
              <h3 class="h6 mb-2">О себе</h3>
              <p id="bio" class="mb-0 text-secondary"></p>
              <hr>
            </div>

            <div id="tagsWrap" class="d-none">
              <h3 class="h6 mb-2">Теги</h3>
              <div id="tags" class="d-flex flex-wrap gap-2"></div>
            </div>
          </div>
        </div>
      </aside>

      <!-- RIGHT: фото -->
      <section class="col-12 col-lg-8">
        <div class="d-flex align-items-end justify-content-between mb-3">
          <div>
            <h2 class="h5 mb-0">Портфолио</h2>
            <div class="text-secondary small" id="photoCount"></div>
          </div>
        </div>

        <div id="masonry" class="masonry"></div>
      </section>
    </div>
  </main>

  <!-- Modal (Lightbox) -->
  <div class="modal fade" id="photoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Фото</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
        </div>
        <div class="modal-body">
          <img id="modalImg" class="modal-img" alt="">
          <div class="d-flex justify-content-between align-items-center mt-3">
            <div class="text-secondary small" id="modalIndex"></div>
            <div class="d-flex gap-2">
              <button class="btn btn-outline-secondary btn-sm" id="prevBtn">←</button>
              <button class="btn btn-outline-secondary btn-sm" id="nextBtn">→</button>
              <a class="btn btn-primary btn-sm" id="openOriginal" href="#" target="_blank" rel="noreferrer">Открыть оригинал</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // --- helpers ---
    const el = (id) => document.getElementById(id);

    function showError(msg) {
      el("error").textContent = msg;
      el("error").classList.remove("d-none");
    }

    function badge(text) {
      const b = document.createElement("span");
      b.className = "badge text-bg-light border tag";
      b.textContent = text;
      return b;
    }

    function formatHeight(v) {
      if (v === null || v === undefined || v === "") return "—";
      const n = Number(v);
      return Number.isFinite(n) ? `${n} см` : String(v);
    }

    function formatAge(v) {
      if (v === null || v === undefined || v === "") return "—";
      const n = Number(v);
      return Number.isFinite(n) ? `${n}` : String(v);
    }

    // --- lightbox state ---
    let currentPhotos = [];
    let currentIndex = 0;

    function openPhotoModal(index, modelName) {
      currentIndex = index;

      const url = currentPhotos[currentIndex];
      el("modalImg").src = url;
      el("modalImg").alt = modelName || "Фото";
      el("modalTitle").textContent = modelName ? `Портфолио — ${modelName}` : "Фото";
      el("modalIndex").textContent = `${currentIndex + 1} / ${currentPhotos.length}`;
      el("openOriginal").href = url;

      const modal = bootstrap.Modal.getOrCreateInstance(el("photoModal"));
      modal.show();
    }

    function stepPhoto(delta, modelName) {
      if (!currentPhotos.length) return;
      currentIndex = (currentIndex + delta + currentPhotos.length) % currentPhotos.length;
      openPhotoModal(currentIndex, modelName);
    }

    // --- main ---
    async function main() {
      // id из URL: model.html?id=1
      const params = new URLSearchParams(location.search);
      const id = params.get("id");
      if (!id) {
        showError('Нет параметра "id" в URL. Пример: model.html?id=1');
        return;
      }

      // грузим JSON
      const res = await fetch("./data.json?v=" + Date.now());
      if (!res.ok) throw new Error("Не удалось загрузить data.json: HTTP " + res.status);

      const data = await res.json();
      el("meta").textContent = data.generated_at ? ("Сгенерировано: " + data.generated_at) : "";

      // ищем модель
      const model = (data.items || []).find(x => String(x.id) === String(id));
      if (!model) {
        showError(`Модель с id=${id} не найдена в data.json`);
        return;
      }

      // --- заполняем анкету ---
      const name = model.name || model.title || "Модель";
      document.title = name + " — Портфолио";
      el("name").textContent = name;

      // небольшая подстрока
      const bits = [];
      if (model.city) bits.push(model.city);
      if (model.age) bits.push(`Возраст: ${formatAge(model.age)}`);
      if (model.height) bits.push(`Рост: ${formatHeight(model.height)}`);
      el("subtitle").textContent = bits.join(" • ");

      el("id").textContent = String(model.id ?? "—");
      el("age").textContent = formatAge(model.age);
      el("height").textContent = formatHeight(model.height);
      el("city").textContent = model.city ? String(model.city) : "—";

      if (model.bio) {
        el("bioWrap").classList.remove("d-none");
        el("bio").textContent = String(model.bio);
      }

      if (Array.isArray(model.tags) && model.tags.length) {
        el("tagsWrap").classList.remove("d-none");
        const wrap = el("tags");
        wrap.innerHTML = "";
        model.tags.forEach(t => wrap.appendChild(badge(t)));
      }

      // --- портфолио фото ---
      // 1) Если у тебя отдельное поле photos: ["url1", "url2"...]
      // 2) Если пока только image (одна картинка), используем её как fallback
      const photos = Array.isArray(model.photos) ? model.photos : [];
      if (!photos.length && model.image) photos.push(model.image);

      currentPhotos = photos;

      el("photoCount").textContent = photos.length ? `Фото: ${photos.length}` : "Фото отсутствуют";

      const masonry = el("masonry");
      masonry.innerHTML = "";

      photos.forEach((url, idx) => {
        const item = document.createElement("div");
        item.className = "masonry-item";

        const card = document.createElement("div");
        card.className = "photo-card";

        const img = document.createElement("img");
        img.loading = "lazy";
        img.src = url;
        img.alt = name;
        img.style.cursor = "zoom-in";

        img.addEventListener("click", () => openPhotoModal(idx, name));

        card.appendChild(img);
        item.appendChild(card);
        masonry.appendChild(item);
      });

      // кнопки модалки
      el("prevBtn").addEventListener("click", () => stepPhoto(-1, name));
      el("nextBtn").addEventListener("click", () => stepPhoto(1, name));

      // клавиатура в модалке (стрелки)
      document.addEventListener("keydown", (e) => {
        // если модалка не открыта — не мешаем
        const isShown = el("photoModal").classList.contains("show");
        if (!isShown) return;

        if (e.key === "ArrowLeft") stepPhoto(-1, name);
        if (e.key === "ArrowRight") stepPhoto(1, name);
      });
    }

    main().catch(err => showError(String(err)));
  </script>
</body>
</html>
