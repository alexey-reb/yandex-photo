<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Портфолио моделей</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .model { border: 1px solid #ddd; padding: 20px; margin: 20px 0; border-radius: 10px; }
        .photo { max-width: 300px; height: auto; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Портфолио моделей</h1>
    <button onclick="loadData()">Загрузить данные</button>
    
    <div id="content">
        <p>Нажмите кнопку для загрузки</p>
    </div>
    
    <div id="json" style="background: #f5f5f5; padding: 15px; margin-top: 20px; border-radius: 5px;">
        <strong>JSON ответ:</strong>
        <pre id="jsonData">Ожидание...</pre>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzDcvPwakuJcr2E2n7I_r7iGwRutetz1Yn9-DbbHVo5mH19lUvl-CbdHEQLZd3sITVKMA/exec";
        
        async function loadData() {
            try {
                const response = await fetch(API_URL + "?t=" + Date.now());
                const data = await response.json();
                
                document.getElementById('jsonData').textContent = JSON.stringify(data, null, 2);
                
                if (data.success) {
                    showModels(data.models);
                } else {
                    document.getElementById('content').innerHTML = '<p class="error">Ошибка в данных</p>';
                }
                
            } catch (error) {
                console.error('Ошибка:', error);
                
                // Показываем локальные тестовые данные
                const localData = {
                    success: true,
                    models: [
                        {
                            id: 1,
                            name: "Тестовая модель 1",
                            photo: "https://storage.yandexcloud.net/alexreb/photo1.jpg",
                            height: 170,
                            grade: 5
                        },
                        {
                            id: 2, 
                            name: "Тестовая модель 2",
                            photo: "https://storage.yandexcloud.net/alexreb/photo1.jpg",
                            height: 175,
                            grade: 4
                        }
                    ],
                    updated: new Date().toISOString(),
                    note: "Локальные данные (ошибка загрузки API)"
                };
                
                document.getElementById('jsonData').textContent = JSON.stringify(localData, null, 2);
                showModels(localData.models);
            }
        }
        
        function showModels(models) {
            let html = '<h2>Модели (' + models.length + ')</h2>';
            
            models.forEach(model => {
                html += `
                <div class="model">
                    <h3>${model.name}</h3>
                    <img src="${model.photo}" 
                         alt="${model.name}" 
                         class="photo"
                         onerror="this.src='https://storage.yandexcloud.net/alexreb/photo1.jpg'">
                    <p><strong>ID:</strong> ${model.id}</p>
                    <p><strong>Рост:</strong> ${model.height} см</p>
                    <p><strong>Оценка:</strong> ${model.grade}/5</p>
                </div>
                `;
            });
            
            document.getElementById('content').innerHTML = html;
        }
        
        // Автозагрузка при старте
        window.onload = loadData;
    </script>
</body>
</html>
