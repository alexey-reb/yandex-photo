<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Model Profile</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .masonry { column-gap: 1rem; column-count: 1; }
    @media (min-width: 576px) { .masonry { column-count: 2; } }
    @media (min-width: 992px) { .masonry { column-count: 3; } }
    @media (min-width: 1200px){ .masonry { column-count: 4; } }

    .masonry-item { break-inside: avoid; margin-bottom: 1rem; }
    .photo-card {
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 .25rem .75rem rgba(0,0,0,.05);
      background: #fff;
    }
    .masonry img {
      width: 100%;
      height: auto;
      display: block;
      background: #f3f3f3;
      cursor: zoom-in;
    }
    .modal-img {
      max-width: 90vw;
      max-height: 80vh;
      width: auto;
      height: auto;
      display: block;
      margin: 0 auto;
      object-fit: contain;
      background: #f3f3f3;
    }
    .avatar {
      width: 96px;
      height: 96px;
      object-fit: contain;
      background: #f1f1f1;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
      gap: 0.5rem 1rem;
    }
    .detail-item .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #6c757d;
      letter-spacing: 0.3px;
    }
    .detail-item .value {
      font-weight: 600;
    }
  </style>
</head>

<body class="bg-body-tertiary">

<main class="container-fluid my-4">

  <div class="container">
    <div id="err" class="mb-3" style="display:none;"></div>
  </div>

  <!-- PROFILE -->
  <section class="mb-4">
    <div class="container">
      <div class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex flex-column flex-md-row gap-3 align-items-md-start justify-content-between">
            <!-- Левая часть: кнопка назад + аватар + информация -->
            <div class="d-flex align-items-start gap-3">
              <!-- Кнопка назад -->
              <a href="index.html" class="btn btn-outline-secondary btn-sm align-self-start">← Back</a>

              <img id="avatar" class="rounded-3 avatar" alt="">
              <div>
                <div class="small text-secondary">Profile</div>
                <div class="h4 mb-1" id="name"></div>
                <div class="text-secondary" id="subtitle"></div>
                <div class="small text-secondary mt-1">ID: <span id="modelId"></span> • Updated: <span id="updatedAt"></span></div>
              </div>
            </div>

            <!-- Правая часть: кнопки удалены -->
          </div>

          <hr class="my-3">

          <div class="detail-grid">
            <div class="detail-item"><div class="label">Age</div><div class="value" id="age">—</div></div>
            <div class="detail-item"><div class="label">Height</div><div class="value" id="height">—</div></div>
            <div class="detail-item"><div class="label">Bust</div><div class="value" id="bust">—</div></div>
            <div class="detail-item"><div class="label">Waist</div><div class="value" id="waist">—</div></div>
            <div class="detail-item"><div class="label">Hips</div><div class="value" id="hips">—</div></div>
            <div class="detail-item"><div class="label">Shoe size</div><div class="value" id="shoe">—</div></div>
            <div class="detail-item"><div class="label">Eye color</div><div class="value" id="eye">—</div></div>
            <div class="detail-item"><div class="label">Hair color</div><div class="value" id="hair">—</div></div>
            <div class="detail-item" id="snapsWrap" style="display:none;">
              <div class="label">Snaps</div>
              <div class="value"><a id="snapsLink" href="#" target="_blank" rel="noreferrer">Open</a></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- PORTFOLIO -->
  <section>
    <div class="container-fluid">
      <div class="d-flex flex-wrap align-items-end justify-content-between gap-2 mb-3 px-2">
        <div>
          <h2 class="h5 mb-0">Portfolio</h2>
          <div class="text-secondary small" id="photoCount"></div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-outline-secondary btn-sm" id="shuffleBtn">Shuffle</button>
          <button class="btn btn-outline-secondary btn-sm" id="resetBtn">Reset</button>
        </div>
      </div>

      <div id="masonry" class="masonry px-2"></div>
      <div id="sentinel" style="height: 1px;"></div>
      <div class="py-3 text-center text-secondary small" id="loadingHint" style="display:none;">Loading more…</div>
    </div>
  </section>

</main>

<!-- MODAL -->
<div class="modal fade" id="photoModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <img id="modalImg" class="modal-img" alt="">
        <div class="d-flex justify-content-between align-items-center mt-3">
          <div class="text-secondary small" id="modalIndex"></div>
          <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm" id="prevBtn">←</button>
            <button class="btn btn-outline-secondary btn-sm" id="nextBtn">→</button>
            <a class="btn btn-primary btn-sm" id="openOriginal" href="#" target="_blank" rel="noreferrer">Open original</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  const el = id => document.getElementById(id);

  function showErr(e) {
    const box = el("err");
    box.style.display = "block";
    box.innerHTML = `<div class="alert alert-danger mb-0">${String(e)}</div>`;
  }

  async function loadModelFromJson() {
    const id = new URLSearchParams(location.search).get("id");
    if (!id) throw new Error("Missing ?id parameter. Example: model.html?id=101");

    const res = await fetch("./data.json?v=" + Date.now());
    if (!res.ok) throw new Error("data.json HTTP " + res.status);

    const data = await res.json();
    const item = (data.items || []).find(x => String(x.model_id) === String(id));
    if (!item) throw new Error("Model not found: " + id);

    return {
      id: item.model_id,
      name: [item.name].filter(Boolean).join(" "),
      updated_at: data.generated_at || "",
      age: item.age,
      height: item.height_cm,
      bust: item.bust_cm,
      waist: item.waist_cm,
      hips: item.hips_cm,
      shoe_size: item.shoe_size,
      eye_color: item.eye_color,
      hair_color: item.hair_color,
      snaps: item.snaps,
      avatar: item.avatar,
      portfolio: item.photos || []
    };
  }

  // ====== state ======
  let photos = [];
  let basePhotos = [];
  let currentIndex = 0;
  const BATCH_SIZE = 24;
  let rendered = 0;
  let io = null;

  function renderProfile(model) {
    document.title = model.name + " — Profile";
    el("name").textContent = model.name;
    el("subtitle").textContent = [
      model.age != null ? `Age: ${model.age}` : null,
      model.height != null ? `Height: ${model.height} cm` : null
    ].filter(Boolean).join(" • ");
    el("modelId").textContent = model.id;
    el("updatedAt").textContent = model.updated_at;

    el("avatar").src = model.avatar || "";
    el("avatar").alt = model.name;
    el("avatar").onerror = () => { el("avatar").src = ""; };

    el("age").textContent = model.age ?? "—";
    el("height").textContent = model.height != null ? model.height + " cm" : "—";
    el("bust").textContent = model.bust != null ? model.bust + " cm" : "—";
    el("waist").textContent = model.waist != null ? model.waist + " cm" : "—";
    el("hips").textContent = model.hips != null ? model.hips + " cm" : "—";
    el("shoe").textContent = model.shoe_size ?? "—";
    el("eye").textContent = model.eye_color || "—";
    el("hair").textContent = model.hair_color || "—";

    if (model.snaps) {
      el("snapsWrap").style.display = "block";
      el("snapsLink").href = model.snaps;
    } else {
      el("snapsWrap").style.display = "none";
    }
  }

  function updatePhotoCount() {
    el("photoCount").textContent = `Showing ${Math.min(rendered, photos.length)} of ${photos.length}`;
  }

  function openModal(idx) {
    currentIndex = idx;
    const url = photos[currentIndex];
    el("modalTitle").textContent = model.name;
    el("modalImg").src = url;
    el("modalImg").alt = model.name;
    el("modalIndex").textContent = `${currentIndex + 1} / ${photos.length}`;
    el("openOriginal").href = url;
    bootstrap.Modal.getOrCreateInstance(el("photoModal")).show();
  }

  function step(delta) {
    if (!photos.length) return;
    currentIndex = (currentIndex + delta + photos.length) % photos.length;
    openModal(currentIndex);
  }

  function appendPhoto(url, idx) {
    const wrap = document.createElement("div");
    wrap.className = "masonry-item";
    const card = document.createElement("div");
    card.className = "photo-card";
    const img = document.createElement("img");
    img.loading = "lazy";
    img.decoding = "async";
    img.src = url;
    img.alt = model.name;
    img.onerror = () => { wrap.remove(); };
    img.addEventListener("click", () => openModal(idx));
    card.appendChild(img);
    wrap.appendChild(card);
    el("masonry").appendChild(wrap);
  }

  function renderNextBatch() {
    const hint = el("loadingHint");
    hint.style.display = "block";
    const start = rendered;
    const end = Math.min(rendered + BATCH_SIZE, photos.length);
    for (let i = start; i < end; i++) {
      appendPhoto(photos[i], i);
    }
    rendered = end;
    updatePhotoCount();
    hint.style.display = "none";
    if (rendered >= photos.length && io) {
      io.disconnect();
      io = null;
    }
  }

  function setupInfiniteScroll() {
    if (io) io.disconnect();
    io = new IntersectionObserver((entries) => {
      if (entries.some(e => e.isIntersecting)) {
        if (rendered < photos.length) renderNextBatch();
      }
    }, { root: null, rootMargin: "800px 0px", threshold: 0.01 });
    io.observe(el("sentinel"));
  }

  function resetMasonryAndLazy() {
    el("masonry").innerHTML = "";
    rendered = 0;
    updatePhotoCount();
    setupInfiniteScroll();
    renderNextBatch();
  }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function bindControls() {
    el("prevBtn").onclick = () => step(-1);
    el("nextBtn").onclick = () => step(1);
    document.addEventListener("keydown", (e) => {
      if (!el("photoModal").classList.contains("show")) return;
      if (e.key === "ArrowLeft") step(-1);
      if (e.key === "ArrowRight") step(1);
    });
    el("shuffleBtn").onclick = () => {
      photos = shuffle([...photos]);
      resetMasonryAndLazy();
    };
    el("resetBtn").onclick = () => {
      photos = [...basePhotos];
      resetMasonryAndLazy();
    };
  }

  (async () => {
    try {
      window.model = await loadModelFromJson();
      basePhotos = [...model.portfolio];
      photos = [...basePhotos];

      renderProfile(model);
      bindControls();
      resetMasonryAndLazy();
    } catch (e) {
      console.error(e);
      showErr(e);
    }
  })();
</script>
</body>
</html>
