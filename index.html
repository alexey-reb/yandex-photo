<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Простейший пример</title>
    <style>
        body {
            font-family: Arial;
            padding: 40px;
            max-width: 800px;
            margin: 0 auto;
        }
        .photo {
            max-width: 400px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .card {
            border: 2px solid #4CAF50;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Простейшая интеграция</h1>
    
    <div id="data-container">
        <p>Загрузка данных...</p>
    </div>
    
    <div id="error" style="color: red; display: none;"></div>

    <script>
        // ==============================================
        // КОНСТАНТЫ (неизменяемые значения)
        // ==============================================
        const API_URL = "https://script.google.com/macros/s/ВАШ_ID_WEB_APP/exec";
        
        // ==============================================
        // ОСНОВНАЯ ФУНКЦИЯ - загружает и показывает данные
        // ==============================================
        async function loadData() {
            try {
                // 1. Показываем статус загрузки
                document.getElementById('data-container').innerHTML = 
                    '<p>⌛ Загружаем данные из Google Sheets...</p>';
                
                // 2. Делаем запрос к API (fetch - встроенная функция браузера)
                const response = await fetch(API_URL);
                
                // 3. Проверяем статус ответа
                if (!response.ok) {
                    throw new Error(`HTTP ошибка: ${response.status}`);
                }
                
                // 4. Парсим JSON (превращаем текст в объект)
                const data = await response.json();
                
                // 5. Проверяем, что данные пришли
                if (data.status !== "success") {
                    throw new Error("Ошибка в данных API");
                }
                
                // 6. Показываем данные на странице
                displayData(data);
                
            } catch (error) {
                // Если произошла ошибка, показываем её
                showError(error);
            }
        }
        
        // ==============================================
        // ФУНКЦИЯ ОТОБРАЖЕНИЯ ДАННЫХ
        // ==============================================
        function displayData(data) {
            // Создаём HTML разметку с данными
            const html = `
                <div class="card">
                    <h2>📊 Данные из Google Sheets:</h2>
                    <p><strong>Текст:</strong> ${data.text}</p>
                    <p><strong>Время обновления:</strong> ${new Date(data.updated).toLocaleString()}</p>
                    
                    <h2>🖼️ Фото из Яндекс.Облака:</h2>
                    <img src="${data.photo}" 
                         alt="Фото из облака" 
                         class="photo"
                         onerror="handlePhotoError(this)">
                    <p><small>Ссылка: ${data.photo}</small></p>
                </div>
            `;
            
            // Вставляем HTML в контейнер
            document.getElementById('data-container').innerHTML = html;
        }
        
        // ==============================================
        // ФУНКЦИЯ ОБРАБОТКИ ОШИБКИ ФОТО
        // ==============================================
        function handlePhotoError(imgElement) {
            console.warn('Фото не загрузилось:', imgElement.src);
            
            // Пробуем альтернативные ссылки
            const backupPhotos = [
                "https://storage.yandexcloud.net/alexreb/photo1.jpg",
                "https://via.placeholder.com/400x300?text=Фото+не+загружено"
            ];
            
            let currentIndex = 0;
            
            // Рекурсивная функция для перебора резервных фото
            function tryNextPhoto() {
                if (currentIndex < backupPhotos.length) {
                    imgElement.src = backupPhotos[currentIndex];
                    currentIndex++;
                }
            }
            
            // Устанавливаем обработчик ошибки
            imgElement.onerror = tryNextPhoto;
            
            // Пробуем первое резервное фото
            tryNextPhoto();
        }
        
        // ==============================================
        // ФУНКЦИЯ ПОКАЗА ОШИБКИ
        // ==============================================
        function showError(error) {
            console.error('Ошибка загрузки:', error);
            
            const errorDiv = document.getElementById('error');
            errorDiv.innerHTML = `
                <h3>❌ Ошибка загрузки</h3>
                <p><strong>Причина:</strong> ${error.message}</p>
                <p><strong>Что проверить:</strong></p>
                <ul>
                    <li>Интернет соединение</li>
                    <li>URL API в константе API_URL</li>
                    <li>Web App опубликован с доступом "Все, даже анонимные"</li>
                </ul>
                <button onclick="loadData()">Попробовать снова</button>
            `;
            errorDiv.style.display = 'block';
            
            // Показываем локальные данные при ошибке
            document.getElementById('data-container').innerHTML = `
                <div class="card">
                    <h2>📊 Локальные данные (оффлайн):</h2>
                    <p><strong>Текст:</strong> Это локальные данные, API не доступен</p>
                    <p><strong>Фото:</strong></p>
                    <img src="https://storage.yandexcloud.net/alexreb/test-photo.jpg" 
                         class="photo"
                         onerror="this.src='https://via.placeholder.com/400x300?text=Оффлайн'">
                </div>
            `;
        }
        
        // ==============================================
        // АВТОМАТИЧЕСКАЯ ЗАГРУЗКА ПРИ СТАРТЕ
        // ==============================================
        // Когда страница полностью загрузится, запускаем loadData()
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
