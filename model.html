<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Модель — Портфолио</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .hero {
      background:
        radial-gradient(1200px 600px at 20% 10%, rgba(13,110,253,.14), transparent 60%),
        radial-gradient(1200px 600px at 80% 0%, rgba(32,201,151,.10), transparent 55%),
        #0b1220;
      color: #fff;
    }
    .hero .muted { color: rgba(255,255,255,.75); }

    .masonry { column-gap: 1rem; column-count: 1; }
    @media (min-width: 576px) { .masonry { column-count: 2; } }
    @media (min-width: 992px) { .masonry { column-count: 3; } }
    @media (min-width: 1200px){ .masonry { column-count: 4; } }

    .masonry-item { break-inside: avoid; margin-bottom: 1rem; }

    .photo-card {
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 .25rem .75rem rgba(0,0,0,.05);
      background: #fff;
    }

    .masonry img {
      width: 100%;
      height: auto;
      display: block;
      background: #f3f3f3;
      cursor: zoom-in;
    }

    .modal-img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      background: #f3f3f3;
    }
  </style>
</head>

<body class="bg-body-tertiary">

<header class="hero py-5">
  <div class="container">
    <div id="err" class="mb-3" style="display:none;"></div>
    <div class="d-flex flex-column flex-md-row align-items-md-end justify-content-between gap-3">
      <div>
        <a href="./index.html" class="text-decoration-none text-white-50 small">← Назад к списку</a>
        <h1 class="display-6 mb-1 mt-2" id="name"></h1>
        <div class="muted" id="subtitle"></div>
      </div>
      <div class="text-md-end">
        <div class="small text-white-50">Обновлено: <span id="updatedAt"></span></div>
        <div class="small text-white-50">ID: <span id="modelId"></span></div>
      </div>
    </div>
  </div>
</header>

<main class="container-fluid my-4">

<section class="mb-4">
  <div class="container">
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex flex-column flex-md-row gap-3 align-items-md-center justify-content-between">
          <div class="d-flex align-items-start gap-3">
            <img id="avatar" class="rounded-3" style="width:96px;height:96px;object-fit:cover;background:#eee;">
            <div>
              <div class="small text-secondary">Профиль</div>
              <div class="h5 mb-1" id="shortName"></div>
              <div class="text-secondary" id="subtitleInline"></div>
            </div>
          </div>
          <div class="d-flex gap-2">
            <a class="btn btn-primary" href="#" id="bookBtn">Забронировать</a>
            <a class="btn btn-outline-secondary" href="#" id="contactBtn">Контакты</a>
          </div>
        </div>

        <hr class="my-3">

        <div class="row g-3">
          <div class="col-6 col-md-3">
            <div class="small text-secondary">Возраст</div>
            <div class="fw-semibold" id="age"></div>
          </div>
          <div class="col-6 col-md-3">
            <div class="small text-secondary">Рост</div>
            <div class="fw-semibold" id="height"></div>
          </div>
          <div class="col-12 col-md-6">
            <div class="small text-secondary">Параметры</div>
            <div class="fw-semibold" id="measurements"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<section>
  <div class="container-fluid">
    <div class="d-flex justify-content-between mb-3 px-2">
      <div>
        <h2 class="h5 mb-0">Портфолио</h2>
        <div class="text-secondary small" id="photoCount"></div>
      </div>
    </div>
    <div id="masonry" class="masonry px-2"></div>
  </div>
</section>

</main>

<div class="modal fade" id="photoModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <img id="modalImg" class="modal-img">
        <div class="d-flex justify-content-between mt-3">
          <div id="modalIndex" class="text-secondary small"></div>
          <a id="openOriginal" class="btn btn-sm btn-primary" target="_blank">Открыть оригинал</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
const el = id => document.getElementById(id);
function showErr(e){ el("err").style.display="block"; el("err").innerHTML=e; }

async function loadModel(){
  const id = new URLSearchParams(location.search).get("id");
  if(!id) throw "no id";
  const r = await fetch("./data.json?v="+Date.now());
  const d = await r.json();
  const m = d.items.find(x=>String(x.model_id)===String(id));
  if(!m) throw "not found";
  return {
    id:m.model_id, name:m.full_name, updated_at:d.generated_at,
    age:m.age, height:m.height_cm,
    measurements:[m.bust_cm,m.waist_cm,m.hips_cm].filter(Boolean).join("–"),
    avatar:m.avatar, portfolio:m.photos||[]
  };
}

let photos=[], idx=0;

function render(){
  el("name").textContent=model.name;
  el("shortName").textContent=model.name;
  el("subtitle").textContent=`Возраст: ${model.age} • Рост: ${model.height} см`;
  el("subtitleInline").textContent=el("subtitle").textContent;
  el("modelId").textContent=model.id;
  el("updatedAt").textContent=model.updated_at;
  el("avatar").src=model.avatar;
  el("age").textContent=model.age;
  el("height").textContent=model.height+" см";
  el("measurements").textContent=model.measurements;

  el("photoCount").textContent=`Фото: ${photos.length}`;
  const m = el("masonry"); m.innerHTML="";
  photos.forEach((u,i)=>{
    const w=document.createElement("div"); w.className="masonry-item";
    const c=document.createElement("div"); c.className="photo-card";
    const im=document.createElement("img"); im.src=u; im.onclick=()=>open(i);
    c.appendChild(im); w.appendChild(c); m.appendChild(w);
  });
}

function open(i){
  idx=i;
  el("modalTitle").textContent=model.name;
  el("modalImg").src=photos[i];
  el("modalIndex").textContent=`${i+1} / ${photos.length}`;
  el("openOriginal").href=photos[i];
  bootstrap.Modal.getOrCreateInstance(el("photoModal")).show();
}

(async()=>{
  try{
    window.model=await loadModel();
    photos=[...model.portfolio];
    render();
  }catch(e){ showErr(e); }
})();
</script>
</body>
</html>
