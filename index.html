<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Models Catalog</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
  .model-card-img {
  height: 40vw;
  max-height: 360px;
  min-height: 240px;
  object-fit: contain;
  background: #f1f1f1;
}
.card {
  overflow: hidden;
}

.model-card-img {
  transition: transform 0.35s ease;
}

.card:hover .model-card-img {
  transform: scale(1.05) translateY(-4px);
}
  </style>
</head>

<body class="bg-body-tertiary">

  <div class="container my-4">
    <h1 class="mb-4">Models Catalog</h1>

    <div class="card mb-3">
      <div class="card-body">
        <div class="row g-2 align-items-end">
          <div class="col-12 col-md-3">
            <label class="form-label">Gender</label>
            <select id="f_gender" class="form-select">
              <option value="">All</option>
              <option value="female">Female</option>
              <option value="male">Male</option>
            </select>
          </div>

          <div class="col-6 col-md-2">
            <label class="form-label">Age from</label>
            <input id="f_age_min" type="number" class="form-control" min="0" step="1" placeholder="—">
          </div>

          <div class="col-6 col-md-2">
            <label class="form-label">Age to</label>
            <input id="f_age_max" type="number" class="form-control" min="0" step="1" placeholder="—">
          </div>

          <!-- Новые фильтры -->
          <div class="col-12 col-md-3">
            <label class="form-label">Eye Color</label>
            <select id="f_eye_color" class="form-select">
              <option value="">All</option>
            </select>
          </div>
          <div class="col-12 col-md-3">
            <label class="form-label">Hair Color</label>
            <select id="f_hair_color" class="form-select">
              <option value="">All</option>
            </select>
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">Shoe size from</label>
            <input id="f_shoe_min" type="number" class="form-control" min="0" step="0.5" placeholder="—">
          </div>
          <div class="col-6 col-md-2">
            <label class="form-label">Shoe size to</label>
            <input id="f_shoe_max" type="number" class="form-control" min="0" step="0.5" placeholder="—">
          </div>

          <div class="col-12 col-md-5 d-flex gap-2 justify-content-md-end">
            <button class="btn btn-primary" id="applyBtn">Apply</button>
            <button class="btn btn-outline-secondary" id="resetBtn">Reset</button>
            <div class="ms-md-2 small text-secondary align-self-center">
              Found: <span id="countFound">0</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="list" class="row g-4"></div>
  </div>

  <script>
    const list = document.getElementById("list");

    let allItems = [];
    let filters = { gender: "", age_min: "", age_max: "", eye_color: "", hair_color: "", shoe_min: "", shoe_max: "" };

    function readFiltersFromUrl_() {
      const p = new URLSearchParams(location.search);
      return {
        gender: p.get("gender") || "",
        age_min: p.get("age_min") || "",
        age_max: p.get("age_max") || "",
        eye_color: p.get("eye_color") || "",
        hair_color: p.get("hair_color") || "",
        shoe_min: p.get("shoe_min") || "",
        shoe_max: p.get("shoe_max") || ""
      };
    }

    function writeFiltersToUrl_(f) {
      const p = new URLSearchParams();
      if (f.gender) p.set("gender", f.gender);
      if (f.age_min) p.set("age_min", f.age_min);
      if (f.age_max) p.set("age_max", f.age_max);
      if (f.eye_color) p.set("eye_color", f.eye_color);
      if (f.hair_color) p.set("hair_color", f.hair_color);
      if (f.shoe_min) p.set("shoe_min", f.shoe_min);
      if (f.shoe_max) p.set("shoe_max", f.shoe_max);

      const qs = p.toString();
      history.replaceState(null, "", qs ? "?" + qs : location.pathname);
    }

    function readFiltersFromUi_() {
      return {
        gender: document.getElementById("f_gender").value,
        age_min: document.getElementById("f_age_min").value,
        age_max: document.getElementById("f_age_max").value,
        eye_color: document.getElementById("f_eye_color").value,
        hair_color: document.getElementById("f_hair_color").value,
        shoe_min: document.getElementById("f_shoe_min").value,
        shoe_max: document.getElementById("f_shoe_max").value
      };
    }

    function syncUiFromFilters_() {
      document.getElementById("f_gender").value = filters.gender || "";
      document.getElementById("f_age_min").value = filters.age_min || "";
      document.getElementById("f_age_max").value = filters.age_max || "";
      document.getElementById("f_eye_color").value = filters.eye_color || "";
      document.getElementById("f_hair_color").value = filters.hair_color || "";
      document.getElementById("f_shoe_min").value = filters.shoe_min || "";
      document.getElementById("f_shoe_max").value = filters.shoe_max || "";
    }

    function applyFilters_(items, f) {
      const amin = f.age_min !== "" ? Number(f.age_min) : null;
      const amax = f.age_max !== "" ? Number(f.age_max) : null;
      const shmin = f.shoe_min !== "" ? Number(f.shoe_min) : null;
      const shmax = f.shoe_max !== "" ? Number(f.shoe_max) : null;

      return items.filter(m => {
        if (f.gender && m.gender !== f.gender) return false;
        if (f.eye_color && m.eye_color !== f.eye_color) return false;
        if (f.hair_color && m.hair_color !== f.hair_color) return false;

        const age = (m.age === "" || m.age == null) ? null : Number(m.age);
        if (amin != null && age != null && age < amin) return false;
        if (amax != null && age != null && age > amax) return false;
        if ((amin != null || amax != null) && age == null) return false;

        const shoe = (m.shoe_size === "" || m.shoe_size == null) ? null : Number(m.shoe_size);
        if (shmin != null && shoe != null && shoe < shmin) return false;
        if (shmax != null && shoe != null && shoe > shmax) return false;
        if ((shmin != null || shmax != null) && shoe == null) return false;

        return true;
      });
    }

    function populateFilterOptions(items) {
      const eyeColors = new Set();
      const hairColors = new Set();
      items.forEach(m => {
        if (m.eye_color) eyeColors.add(m.eye_color);
        if (m.hair_color) hairColors.add(m.hair_color);
      });

      const eyeSel = document.getElementById("f_eye_color");
      const hairSel = document.getElementById("f_hair_color");
      // clear old options except first "All"
      eyeSel.innerHTML = '<option value="">All</option>';
      hairSel.innerHTML = '<option value="">All</option>';
      [...eyeColors].sort().forEach(c => {
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        eyeSel.appendChild(opt);
      });
      [...hairColors].sort().forEach(c => {
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        hairSel.appendChild(opt);
      });
    }

    function render() {
      list.innerHTML = "";

      const items = applyFilters_(allItems, filters);
      document.getElementById("countFound").textContent = String(items.length);

      items.forEach(m => {
        const fullName = [m.name].filter(Boolean).join(" ");

        const col = document.createElement("div");
        col.className = "col-6 col-md-4 col-lg-3";

        const card = document.createElement("div");
        card.className = "card h-100 shadow-sm";

        const img = document.createElement("img");
        img.className = "card-img-top model-card-img";
        img.src = m.avatar || "";
        img.alt = fullName || "";
        img.loading = "lazy";
        img.style.cursor = "pointer";
        img.addEventListener("click", () => {
          window.location.href = `model.html?id=${encodeURIComponent(m.model_id)}`;
        });

        const body = document.createElement("div");
        body.className = "card-body";

        const h = document.createElement("h5");
        h.className = "card-title";
        h.textContent = fullName;

        const p = document.createElement("p");
        p.className = "card-text text-secondary";
        let details = [];
        if (m.age != null && m.age !== "") details.push(`Age: ${m.age}`);
        if (m.height_cm != null && m.height_cm !== "") details.push(`Height: ${m.height_cm} cm`);
        if (m.eye_color) details.push(`Eyes: ${m.eye_color}`);
        if (m.hair_color) details.push(`Hair: ${m.hair_color}`);
        if (m.shoe_size != null && m.shoe_size !== "") details.push(`Shoe: ${m.shoe_size}`);
        p.textContent = details.join(" • ");

        body.appendChild(h);
        body.appendChild(p);

        card.appendChild(img);
        card.appendChild(body);
        col.appendChild(card);
        list.appendChild(col);
      });
    }

    function bindFilterUi() {
      document.getElementById("applyBtn").onclick = () => {
        filters = readFiltersFromUi_();
        writeFiltersToUrl_(filters);
        render();
      };

      document.getElementById("resetBtn").onclick = () => {
        filters = { gender: "", age_min: "", age_max: "", eye_color: "", hair_color: "", shoe_min: "", shoe_max: "" };
        writeFiltersToUrl_(filters);
        syncUiFromFilters_();
        render();
      };
    }

    async function load() {
      const res = await fetch("./data.json?v=" + Date.now());
      if (!res.ok) throw new Error("data.json HTTP " + res.status);

      const data = await res.json();
      allItems = (data.items || []).slice();

      // сортировка по priority (меньше = выше)
      allItems.sort((a, b) => {
        const pa = (a.priority == null || a.priority === "") ? 1e9 : Number(a.priority);
        const pb = (b.priority == null || b.priority === "") ? 1e9 : Number(b.priority);
        if (pa !== pb) return pa - pb;
        return String(a.model_id || "").localeCompare(String(b.model_id || ""));
      });

      // populate filter selects with unique values from data
      populateFilterOptions(allItems);

      // читаем фильтры из URL, синхроним UI и рендерим
      filters = readFiltersFromUrl_();
      syncUiFromFilters_();

      bindFilterUi();
      render();
    }

    load().catch(err => {
      list.innerHTML = `<div class="col"><div class="alert alert-danger">${String(err)}</div></div>`;
      console.error(err);
    });
  </script>

</body>
</html>
