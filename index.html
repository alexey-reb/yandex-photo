<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Модель — Персональная страница (Demo)</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .hero {
      background:
        radial-gradient(1200px 600px at 20% 10%, rgba(13,110,253,.14), transparent 60%),
        radial-gradient(1200px 600px at 80% 0%, rgba(32,201,151,.10), transparent 55%),
        #0b1220;
      color: #fff;
    }
    .hero .muted { color: rgba(255,255,255,.75); }

    /* Masonry без библиотек: CSS columns */
    .masonry {
      column-gap: 1rem;
      column-count: 1;
    }
    @media (min-width: 576px) { .masonry { column-count: 2; } }
    @media (min-width: 992px) { .masonry { column-count: 3; } }
    @media (min-width: 1200px){ .masonry { column-count: 4; } }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 1rem;
    }

    .photo-card {
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 .25rem .75rem rgba(0,0,0,.05);
      background: #fff;
    }

    .masonry img {
      width: 100%;
      height: auto;
      display: block;
      background: #f3f3f3;
      cursor: zoom-in;
    }

    .spec dt { color: #6c757d; font-weight: 500; }
    .spec dd { margin-bottom: .6rem; }

    .chip { cursor: default; }

    .modal-img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      background: #f3f3f3;
    }
  </style>
</head>

<body class="bg-body-tertiary">

  <!-- HERO -->
  <header class="hero py-5">
    <div class="container">
      <div class="d-flex flex-column flex-md-row align-items-md-end justify-content-between gap-3">
        <div>
          <a href="#" class="text-decoration-none text-white-50 small">← Назад к списку</a>
          <h1 class="display-6 mb-1 mt-2" id="name"></h1>
          <div class="muted" id="subtitle"></div>
        </div>
        <div class="text-md-end">
          <div class="small text-white-50">Обновлено: <span id="updatedAt"></span></div>
          <div class="small text-white-50">ID: <span id="modelId"></span></div>
        </div>
      </div>
    </div>
  </header>

  <main class="container my-4">
    <div class="row g-4">
      <!-- LEFT: Profile -->
      <aside class="col-12 col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex align-items-start gap-3">
              <img id="avatar" alt="" class="rounded-3" style="width:84px;height:84px;object-fit:cover;background:#eee;">
              <div class="flex-grow-1">
                <div class="small text-secondary">Статус</div>
                <div class="fw-semibold" id="status"></div>

                <div class="mt-2 d-flex flex-wrap gap-2" id="badges"></div>
              </div>
            </div>

            <hr class="my-3">

            <h2 class="h6 mb-3">Параметры</h2>
            <dl class="spec row mb-0">
              <dt class="col-5">Возраст</dt>
              <dd class="col-7" id="age"></dd>

              <dt class="col-5">Рост</dt>
              <dd class="col-7" id="height"></dd>

              <dt class="col-5">Город</dt>
              <dd class="col-7" id="city"></dd>

              <dt class="col-5">Параметры</dt>
              <dd class="col-7" id="measurements"></dd>

              <dt class="col-5">Обувь</dt>
              <dd class="col-7" id="shoe"></dd>

              <dt class="col-5">Волосы</dt>
              <dd class="col-7" id="hair"></dd>

              <dt class="col-5">Глаза</dt>
              <dd class="col-7" id="eyes"></dd>

              <dt class="col-5">Языки</dt>
              <dd class="col-7" id="langs"></dd>
            </dl>

            <hr class="my-3">

            <h2 class="h6 mb-2">О себе</h2>
            <p class="text-secondary mb-3" id="bio"></p>

            <div class="d-grid gap-2">
              <a class="btn btn-primary" href="#" id="bookBtn">Забронировать</a>
              <a class="btn btn-outline-secondary" href="#" id="contactBtn">Контакты</a>
            </div>
          </div>
        </div>
      </aside>

      <!-- RIGHT: Portfolio -->
      <section class="col-12 col-lg-8">
        <div class="d-flex flex-wrap align-items-end justify-content-between gap-2 mb-3">
          <div>
            <h2 class="h5 mb-0">Портфолио</h2>
            <div class="text-secondary small" id="photoCount"></div>
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm" id="shuffleBtn">Перемешать</button>
            <button class="btn btn-outline-secondary btn-sm" id="resetBtn">Сбросить</button>
          </div>
        </div>

        <div id="masonry" class="masonry"></div>
      </section>
    </div>
  </main>

  <!-- Modal (Lightbox) -->
  <div class="modal fade" id="photoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Фото</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
        </div>
        <div class="modal-body">
          <img id="modalImg" class="modal-img" alt="">
          <div class="d-flex justify-content-between align-items-center mt-3">
            <div class="text-secondary small" id="modalIndex"></div>
            <div class="d-flex gap-2">
              <button class="btn btn-outline-secondary btn-sm" id="prevBtn">←</button>
              <button class="btn btn-outline-secondary btn-sm" id="nextBtn">→</button>
              <a class="btn btn-primary btn-sm" id="openOriginal" href="#" target="_blank" rel="noreferrer">Открыть оригинал</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // ====== ТЕСТОВЫЕ ДАННЫЕ (потом заменим на JSON) ======
    const model = {
      id: "101",
      name: "Анна Воронова",
      status: "Доступна на январь",
      updated_at: "2026-01-03",
      age: 22,
      height: 175,
      city: "Хельсинки",
      measurements: "84–60–90",
      shoe: "39",
      hair: "Русые",
      eyes: "Зелёные",
      languages: ["RU", "EN"],
      bio: "Коммерческая и fashion-съёмка, каталоги, e-commerce. Легко работаю с позингом и светом, быстро вхожу в роль. Открыта к поездкам.",
      badges: ["Fashion", "E-commerce", "Beauty", "Runway"],
      avatar: "https://storage.yandexcloud.net/alexreb/1.jpg",
      contacts: {
        email: "model@example.com",
        instagram: "@modelanna",
        phone: "+358 00 000 0000"
      },
      portfolio: [
        // Разные пропорции специально, чтобы проверить сетку
        "https://storage.yandexcloud.net/alexreb/1.jpg",
        "https://storage.yandexcloud.net/alexreb/2.jpg",
        "https://storage.yandexcloud.net/alexreb/4.jpg",
        "https://storage.yandexcloud.net/alexreb/5.jpg",
        "https://storage.yandexcloud.net/alexreb/6.jpg",
        "https://storage.yandexcloud.net/alexreb/7.jpg",
        "https://storage.yandexcloud.net/alexreb/8.jpg",
        "https://storage.yandexcloud.net/alexreb/9.jpg"
      ]
    };

    // ====== РЕНДЕР ======
    const el = (id) => document.getElementById(id);

    function setText(id, value, fallback="—") {
      el(id).textContent = (value === null || value === undefined || value === "") ? fallback : String(value);
    }

    function chip(text) {
      const b = document.createElement("span");
      b.className = "badge text-bg-light border chip";
      b.textContent = text;
      return b;
    }

    function renderProfile() {
      el("name").textContent = model.name;
      el("modelId").textContent = model.id;
      el("updatedAt").textContent = model.updated_at;

      const subtitleBits = [
        model.city,
        `Возраст: ${model.age}`,
        `Рост: ${model.height} см`
      ].filter(Boolean);
      el("subtitle").textContent = subtitleBits.join(" • ");

      el("avatar").src = model.avatar;
      el("avatar").alt = model.name;

      setText("status", model.status);
      setText("age", model.age);
      setText("height", model.height + " см");
      setText("city", model.city);
      setText("measurements", model.measurements);
      setText("shoe", model.shoe);
      setText("hair", model.hair);
      setText("eyes", model.eyes);
      setText("langs", (model.languages || []).join(", "));
      setText("bio", model.bio, "");

      const badgesWrap = el("badges");
      badgesWrap.innerHTML = "";
      (model.badges || []).forEach(t => badgesWrap.appendChild(chip(t)));

      el("bookBtn").addEventListener("click", (e) => {
        e.preventDefault();
        alert("Demo: тут будет заявка на бронь");
      });

      el("contactBtn").addEventListener("click", (e) => {
        e.preventDefault();
        alert(
          `Email: ${model.contacts.email}\n` +
          `Instagram: ${model.contacts.instagram}\n` +
          `Phone: ${model.contacts.phone}`
        );
      });
    }

    // ====== LIGHTBOX ======
    let photos = [...model.portfolio];
    let currentIndex = 0;

    function openModal(idx) {
      currentIndex = idx;
      const url = photos[currentIndex];

      el("modalTitle").textContent = `Портфолио — ${model.name}`;
      el("modalImg").src = url;
      el("modalImg").alt = model.name;
      el("modalIndex").textContent = `${currentIndex + 1} / ${photos.length}`;
      el("openOriginal").href = url;

      const modal = bootstrap.Modal.getOrCreateInstance(el("photoModal"));
      modal.show();
    }

    function step(delta) {
      if (!photos.length) return;
      currentIndex = (currentIndex + delta + photos.length) % photos.length;
      openModal(currentIndex);
    }

    function renderMasonry() {
      el("photoCount").textContent = `Фото: ${photos.length}`;

      const masonry = el("masonry");
      masonry.innerHTML = "";

      photos.forEach((url, idx) => {
        const wrap = document.createElement("div");
        wrap.className = "masonry-item";

        const card = document.createElement("div");
        card.className = "photo-card";

        const img = document.createElement("img");
        img.loading = "lazy";
        img.src = url;
        img.alt = model.name;
        img.onerror = () => {
  img.src = "https://storage.yandexcloud.net/alexreb/test.jpeg"; // любая гарантированная заглушка
};


        img.addEventListener("click", () => openModal(idx));

        card.appendChild(img);
        wrap.appendChild(card);
        masonry.appendChild(wrap);
      });
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function bindControls() {
      el("prevBtn").addEventListener("click", () => step(-1));
      el("nextBtn").addEventListener("click", () => step(1));

      document.addEventListener("keydown", (e) => {
        const isShown = el("photoModal").classList.contains("show");
        if (!isShown) return;
        if (e.key === "ArrowLeft") step(-1);
        if (e.key === "ArrowRight") step(1);
      });

      el("shuffleBtn").addEventListener("click", () => {
        photos = shuffle([...photos]);
        renderMasonry();
      });

      el("resetBtn").addEventListener("click", () => {
        photos = [...model.portfolio];
        renderMasonry();
      });
    }

    // init
    renderProfile();
    renderMasonry();
    bindControls();
  </script>
</body>
</html>
