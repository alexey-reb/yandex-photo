<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Модели</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  /* Контейнер для картинки с ограничением */
  .card-img-container {
    height: 240px;
    overflow: hidden;
    position: relative;
    background: #f1f1f1;
    border-radius: 4px 4px 0 0;
  }
  
  .model-card-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    transition: transform 0.3s ease;
    cursor: pointer;
  }
  
  .model-card-img:hover {
    transform: scale(1.1);
  }
  
  .card {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  
  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important;
    z-index: 5;
    position: relative;
  }
</style>

</head>

<body class="bg-body-tertiary">

<div class="container my-4">
  <h1 class="mb-4">Каталог моделей</h1>
  <div id="list" class="row g-4"></div>
</div>

<script>
  const list = document.getElementById("list");

  async function load() {
    const res = await fetch("./data.json?v=" + Date.now());
    if (!res.ok) throw new Error("data.json HTTP " + res.status);

    const data = await res.json();

    data.items.forEach(m => {
      const fullName = [m.name].filter(Boolean).join(" ");
      const col = document.createElement("div");
      col.className = "col-6 col-md-4 col-lg-3";

      const card = document.createElement("div");
      card.className = "card h-100 shadow-sm";

      // Создаем контейнер для картинки
      const imgContainer = document.createElement("div");
      imgContainer.className = "card-img-container";

      const img = document.createElement("img");
      img.className = "model-card-img";
      img.src = m.avatar || "";
      img.alt = fullName || "";
      img.loading = "lazy";
      
      // Обработчик клика по картинке
      img.addEventListener("click", () => {
        window.location.href = `model.html?id=${m.model_id}`;
      });

      imgContainer.appendChild(img);
      card.appendChild(imgContainer);

      const body = document.createElement("div");
      body.className = "card-body";

      const h = document.createElement("h5");
      h.className = "card-title";
      h.textContent = fullName;

      const p = document.createElement("p");
      p.className = "card-text text-secondary";
      p.textContent = [
        m.age ? `Возраст: ${m.age}` : null,
        m.height_cm ? `Рост: ${m.height_cm} см` : null
      ].filter(Boolean).join(" • ");

      const a = document.createElement("a");
      a.href = `model.html?id=${encodeURIComponent(m.model_id)}`;
      /*a.className = "btn btn-primary btn-sm";
      a.textContent = "Открыть профиль";*/

      body.appendChild(h);
      body.appendChild(p);
      body.appendChild(a);

      card.appendChild(body);
      col.appendChild(card);
      list.appendChild(col);
    });
  }

  load().catch(err => {
    list.innerHTML = `<div class="col"><div class="alert alert-danger">${String(err)}</div></div>`;
    console.error(err);
  });
</script>

</body>
</html>
