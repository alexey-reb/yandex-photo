<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Профиль модели</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Masonry (CSS columns) */
    .masonry { column-gap: 1rem; column-count: 1; }
    @media (min-width: 576px) { .masonry { column-count: 2; } }
    @media (min-width: 992px) { .masonry { column-count: 3; } }
    @media (min-width: 1200px){ .masonry { column-count: 4; } }

    .masonry-item { break-inside: avoid; margin-bottom: 1rem; }

    .photo-card {
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 .25rem .75rem rgba(0,0,0,.05);
      background: #fff;
    }

    .masonry img {
      width: 100%;
      height: auto;
      display: block;
      background: #f3f3f3;
      cursor: zoom-in;
    }

    .modal-img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      background: #f3f3f3;
    }

    /* Avatar: НЕ режем лицо */
    .avatar {
      width: 96px;
      height: 96px;
      object-fit: contain;    /* ключевое */
      background: #f1f1f1;
    }
  </style>
</head>

<body class="bg-body-tertiary">

  <main class="container-fluid my-4">

    <div class="container">
      <div id="err" class="mb-3" style="display:none;"></div>
    </div>

    <!-- PROFILE TOP (без hero) -->
    <section class="mb-4">
      <div class="container">
        <div class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex flex-column flex-md-row gap-3 align-items-md-center justify-content-between">
              <div class="d-flex align-items-start gap-3">
                <img id="avatar" class="rounded-3 avatar" alt="">
                <div>
                  <div class="small text-secondary">Профиль</div>
                  <div class="h4 mb-1" id="name"></div>
                  <div class="text-secondary" id="subtitle"></div>
                  <div class="small text-secondary mt-1">ID: <span id="modelId"></span> • Обновлено: <span id="updatedAt"></span></div>
                </div>
              </div>

              <div class="d-flex gap-2">
                <a class="btn btn-primary" href="#" id="bookBtn">Забронировать</a>
                <a class="btn btn-outline-secondary" href="#" id="contactBtn">Контакты</a>
              </div>
            </div>

            <hr class="my-3">

            <div class="row g-3">
              <div class="col-6 col-md-3">
                <div class="small text-secondary">Возраст</div>
                <div class="fw-semibold" id="age"></div>
              </div>
              <div class="col-6 col-md-3">
                <div class="small text-secondary">Рост</div>
                <div class="fw-semibold" id="height"></div>
              </div>
              <div class="col-12 col-md-6">
                <div class="small text-secondary">Параметры</div>
                <div class="fw-semibold" id="measurements"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- PORTFOLIO FULL WIDTH -->
    <section>
      <div class="container-fluid">
        <div class="d-flex flex-wrap align-items-end justify-content-between gap-2 mb-3 px-2">
          <div>
            <h2 class="h5 mb-0">Портфолио</h2>
            <div class="text-secondary small" id="photoCount"></div>
          </div>

          <div class="d-flex gap-2">
            <button class="btn btn-outline-secondary btn-sm" id="shuffleBtn">Перемешать</button>
            <button class="btn btn-outline-secondary btn-sm" id="resetBtn">Сбросить</button>
          </div>
        </div>

        <div id="masonry" class="masonry px-2"></div>

        <!-- sentinel for infinite scroll -->
        <div id="sentinel" style="height: 1px;"></div>

        <div class="py-3 text-center text-secondary small" id="loadingHint" style="display:none;">
          Загружаю ещё…
        </div>
      </div>
    </section>

  </main>

  <!-- MODAL -->
  <div class="modal fade" id="photoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <img id="modalImg" class="modal-img" alt="">
          <div class="d-flex justify-content-between align-items-center mt-3">
            <div class="text-secondary small" id="modalIndex"></div>
            <div class="d-flex gap-2">
              <button class="btn btn-outline-secondary btn-sm" id="prevBtn">←</button>
              <button class="btn btn-outline-secondary btn-sm" id="nextBtn">→</button>
              <a class="btn btn-primary btn-sm" id="openOriginal" href="#" target="_blank" rel="noreferrer">Открыть оригинал</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const el = (id) => document.getElementById(id);

    function showErr(e) {
      const box = el("err");
      box.style.display = "block";
      box.innerHTML = `<div class="alert alert-danger mb-0">${String(e)}</div>`;
    }

    async function loadModelFromJson() {
      const id = new URLSearchParams(location.search).get("id");
      if (!id) throw new Error("Нет параметра id. Пример: model.html?id=101");

      const res = await fetch("./data.json?v=" + Date.now());
      if (!res.ok) throw new Error("data.json HTTP " + res.status);

      const data = await res.json();
      const item = (data.items || []).find(x => String(x.model_id) === String(id));
      if (!item) throw new Error("Модель не найдена: " + id);

      return {
        id: item.model_id,
        name: item.full_name,
        updated_at: data.generated_at || "",
        age: item.age,
        height: item.height_cm,
        measurements: [item.bust_cm, item.waist_cm, item.hips_cm].filter(x => x != null).join("–"),
        avatar: item.avatar,
        portfolio: item.photos || []
      };
    }

    // ====== state ======
    let photos = [];
    let basePhotos = [];
    let currentIndex = 0;

    // lazy pagination for masonry
    const BATCH_SIZE = 24;
    let rendered = 0;
    let io = null;

    function subtitleText() {
      return [
        model.age != null ? `Возраст: ${model.age}` : null,
        model.height != null ? `Рост: ${model.height} см` : null
      ].filter(Boolean).join(" • ");
    }

    function renderProfile() {
      document.title = model.name + " — Портфолио";
      el("name").textContent = model.name;
      el("subtitle").textContent = subtitleText();
      el("modelId").textContent = model.id;
      el("updatedAt").textContent = model.updated_at;

      el("avatar").src = model.avatar || "";
      el("avatar").alt = model.name;
      el("avatar").onerror = () => { el("avatar").src = ""; };

      el("age").textContent = model.age ?? "—";
      el("height").textContent = (model.height != null ? model.height + " см" : "—");
      el("measurements").textContent = model.measurements || "—";

      el("bookBtn").onclick = (e) => { e.preventDefault(); alert("Demo: тут будет заявка на бронь"); };
      el("contactBtn").onclick = (e) => { e.preventDefault(); alert("Demo: контакты (позже подключим)"); };
    }

    function updatePhotoCount() {
      el("photoCount").textContent = `Показано ${Math.min(rendered, photos.length)} из ${photos.length}`;
    }

    function openModal(idx) {
      currentIndex = idx;
      const url = photos[currentIndex];

      el("modalTitle").textContent = model.name;
      el("modalImg").src = url;
      el("modalImg").alt = model.name;
      el("modalIndex").textContent = `${currentIndex + 1} / ${photos.length}`;
      el("openOriginal").href = url;

      bootstrap.Modal.getOrCreateInstance(el("photoModal")).show();
    }

    function step(delta) {
      if (!photos.length) return;
      currentIndex = (currentIndex + delta + photos.length) % photos.length;
      openModal(currentIndex);
    }

    function appendPhoto(url, idx) {
      const wrap = document.createElement("div");
      wrap.className = "masonry-item";

      const card = document.createElement("div");
      card.className = "photo-card";

      const img = document.createElement("img");
      img.loading = "lazy";       // браузерное lazy
      img.decoding = "async";
      img.src = url;
      img.alt = model.name;
      img.onerror = () => { wrap.remove(); }; // если битая ссылка — убираем карточку

      img.addEventListener("click", () => openModal(idx));

      card.appendChild(img);
      wrap.appendChild(card);
      el("masonry").appendChild(wrap);
    }

    function renderNextBatch() {
      const hint = el("loadingHint");
      hint.style.display = "block";

      const start = rendered;
      const end = Math.min(rendered + BATCH_SIZE, photos.length);

      for (let i = start; i < end; i++) {
        appendPhoto(photos[i], i);
      }
      rendered = end;

      updatePhotoCount();
      hint.style.display = "none";

      if (rendered >= photos.length && io) {
        io.disconnect();
        io = null;
      }
    }

    function setupInfiniteScroll() {
      if (io) io.disconnect();

      io = new IntersectionObserver((entries) => {
        if (entries.some(e => e.isIntersecting)) {
          if (rendered < photos.length) renderNextBatch();
        }
      }, { root: null, rootMargin: "800px 0px", threshold: 0.01 });

      io.observe(el("sentinel"));
    }

    function resetMasonryAndLazy() {
      el("masonry").innerHTML = "";
      rendered = 0;
      updatePhotoCount();
      setupInfiniteScroll();
      renderNextBatch();
    }

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function bindControls() {
      el("prevBtn").onclick = () => step(-1);
      el("nextBtn").onclick = () => step(1);

      document.addEventListener("keydown", (e) => {
        const isShown = el("photoModal").classList.contains("show");
        if (!isShown) return;
        if (e.key === "ArrowLeft") step(-1);
        if (e.key === "ArrowRight") step(1);
      });

      el("shuffleBtn").onclick = () => {
        photos = shuffle([...photos]);
        resetMasonryAndLazy();
      };

      el("resetBtn").onclick = () => {
        photos = [...basePhotos];
        resetMasonryAndLazy();
      };
    }

    (async () => {
      try {
        window.model = await loadModelFromJson();
        basePhotos = [...model.portfolio];
        photos = [...basePhotos];

        renderProfile();
        bindControls();
        resetMasonryAndLazy();
      } catch (e) {
        console.error(e);
        showErr(e);
      }
    })();
  </script>
</body>
</html>
