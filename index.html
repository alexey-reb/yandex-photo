<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Каталог</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
    .top { display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin: 12px 0 18px; }
    input, select { padding: 10px 12px; border:1px solid #ddd; border-radius:10px; font-size: 14px; }
    .meta { color:#555; font-size: 14px; margin: 8px 0 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .card { border: 1px solid #ddd; border-radius: 14px; overflow: hidden; background: #fff; }
    .img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; background: #f3f3f3; }
    .p { padding: 12px; }
    .title { font-weight: 650; margin: 0 0 8px; }
    .tags { color: #666; font-size: 13px; margin-top: 10px; }
    .price { margin-top: 8px; font-weight: 600; }
    .err { color: #b00020; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="meta"></div>
<div id="grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;"></div>

<script>
function renderCards(items) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for (const item of items) {
    const card = document.createElement("div");
    card.style.border = "1px solid #ddd";
    card.style.borderRadius = "12px";
    card.style.overflow = "hidden";

    if (item.image) {
      const img = document.createElement("img");
      img.src = item.image;
      img.alt = item.title || "";
      img.loading = "lazy";
      img.style.width = "100%";
      img.style.aspectRatio = "4/3";
      img.style.objectFit = "cover";
      card.appendChild(img);
    }

    const body = document.createElement("div");
    body.style.padding = "12px";

    const title = document.createElement("div");
    title.textContent = item.title || "(без названия)";
    title.style.fontWeight = "600";
    body.appendChild(title);

    if (item.description) {
      const desc = document.createElement("div");
      desc.textContent = item.description;
      desc.style.marginTop = "6px";
      body.appendChild(desc);
    }

    if (Array.isArray(item.tags) && item.tags.length) {
      const tags = document.createElement("div");
      tags.textContent = item.tags.join(", ");
      tags.style.marginTop = "10px";
      tags.style.fontSize = "12px";
      tags.style.color = "#666";
      body.appendChild(tags);
    }

    card.appendChild(body);
    grid.appendChild(card);
  }
}

(async () => {
  const res = await fetch("./data.json?v=" + Date.now());
  if (!res.ok) throw new Error("data.json загрузить не удалось: " + res.status);

  const data = await res.json();
  document.getElementById("meta").textContent =
    `Обновлено: ${data.generated_at} • Всего: ${data.count}`;

  renderCards(data.items || []);
})();
</script>
</body>
</html>
