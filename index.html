<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио модели | Школа моделей</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --accent: #ec4899;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #f1f5f9;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Шапка */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .model-selector {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .model-select {
            padding: 12px 20px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 1rem;
            min-width: 200px;
        }
        
        /* Основная информация */
        .model-header {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 40px;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        @media (max-width: 768px) {
            .model-header {
                grid-template-columns: 1fr;
            }
        }
        
        .main-photo {
            width: 100%;
            height: 400px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .model-info {
            padding: 20px 0;
        }
        
        .model-name {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(90deg, white, #c7d2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .model-id {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            color: #cbd5e1;
        }
        
        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: transform 0.3s, background 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.1);
        }
        
        .stat-value {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary);
            display: block;
            line-height: 1;
        }
        
        .stat-label {
            font-size: 1rem;
            color: #94a3b8;
            margin-top: 10px;
        }
        
        /* Галерея */
        .gallery-section {
            margin: 60px 0;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .tab-btn {
            padding: 12px 24px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        
        .gallery-item {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 3/4;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .gallery-item:hover {
            transform: scale(1.02);
        }
        
        .gallery-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8));
            padding: 20px;
            color: white;
            transform: translateY(100%);
            transition: transform 0.3s;
        }
        
        .gallery-item:hover .photo-overlay {
            transform: translateY(0);
        }
        
        .photo-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .lightbox.active {
            display: flex;
        }
        
        .lightbox-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 10px;
        }
        
        .lightbox-close {
            position: absolute;
            top: 30px;
            right: 30px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .lightbox-nav {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            transform: translateY(-50%);
        }
        
        .nav-btn {
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Кнопки */
        .btn {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            font-size: 1rem;
            text-decoration: none;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }
        
        /* Загрузка */
        .loading {
            text-align: center;
            padding: 100px 20px;
        }
        
        .loader {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .model-name {
                font-size: 2.2rem;
            }
            
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
            
            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }
        }
        
        .photo-counter {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <header>
            <div class="logo">MODEL PORTFOLIO</div>
            <div class="model-selector">
                <select id="modelSelect" class="model-select" onchange="loadModel(this.value)">
                    <option value="1">Анна Петрова</option>
                    <option value="2">Мария Иванова</option>
                    <option value="3">Елена Сидорова</option>
                </select>
                <button class="btn btn-secondary" onclick="refreshData()">
                    <i class="fas fa-sync-alt"></i> Обновить
                </button>
            </div>
        </header>
        
        <!-- Основной контент -->
        <div id="content">
            <div class="loading">
                <div class="loader"></div>
                <h3>Загрузка портфолио...</h3>
                <p>Подключаемся к Яндекс.Облаку</p>
            </div>
        </div>
        
        <!-- Lightbox для просмотра фото -->
        <div class="lightbox" id="lightbox">
            <div class="lightbox-close" onclick="closeLightbox()">
                <i class="fas fa-times"></i>
            </div>
            <div class="lightbox-nav">
                <button class="nav-btn" onclick="prevPhoto()">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <button class="nav-btn" onclick="nextPhoto()">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
            <img class="lightbox-img" id="lightbox-img" src="" alt="">
            <div id="lightbox-info" style="position: absolute; bottom: 30px; left: 0; right: 0; text-align: center; color: white;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // ==============================================
        // КОНФИГУРАЦИЯ
        // ==============================================
        const API_URL = "https://script.google.com/macros/s/AKfycbzDcvPwakuJcr2E2n7I_r7iGwRutetz1Yn9-DbbHVo5mH19lUvl-CbdHEQLZd3sITVKMA/exec";
        let currentModelId = 1;
        let currentModelData = null;
        let currentCategory = 'all';
        let lightboxPhotos = [];
        let currentLightboxIndex = 0;
        
        // ==============================================
        // ОСНОВНАЯ ФУНКЦИЯ ЗАГРУЗКИ
        // ==============================================
        
        // В вашем HTML файле замените функцию loadModelData:

async function loadModelData() {
  try {
    const url = `https://script.google.com/macros/s/AKfycbzDcvPwakuJcr2E2n7I_r7iGwRutetz1Yn9-DbbHVo5mH19lUvl-CbdHEQLZd3sITVKMA/exec?action=portfolio&id=1`;
    
    // Создаем iframe для обхода CORS
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    iframe.src = url;
    document.body.appendChild(iframe);
    
    // Ожидаем сообщение от iframe
    return new Promise((resolve, reject) => {
      const messageHandler = (event) => {
        if (event.data && event.data.type === 'api_response') {
          window.removeEventListener('message', messageHandler);
          document.body.removeChild(iframe);
          
          if (event.data.data.success) {
            resolve(event.data.data.data);
          } else {
            reject(new Error(event.data.data.error));
          }
        }
      };
      
      window.addEventListener('message', messageHandler);
      
      // Таймаут на случай ошибки
      setTimeout(() => {
        window.removeEventListener('message', messageHandler);
        document.body.removeChild(iframe);
        reject(new Error('Таймаут загрузки данных'));
      }, 10000);
    });
    
  } catch (error) {
    console.error('Ошибка загрузки:', error);
    throw error;
  }
}
        
        // ==============================================
        // РЕНДЕРИНГ ПОРТФОЛИО
        // ==============================================
        
        function renderPortfolio(modelData) {
            const contentDiv = document.getElementById('content');
            
            // Подготавливаем данные для lightbox
            lightboxPhotos = [];
            Object.keys(modelData.portfolio).forEach(category => {
                modelData.portfolio[category].forEach(photo => {
                    lightboxPhotos.push({
                        url: photo,
                        category: category,
                        name: photo.split('/').pop()
                    });
                });
            });
            
            contentDiv.innerHTML = `
                <!-- Основная информация -->
                <div class="model-header">
                    <div>
                        <img src="${modelData.portfolio.polaroids?.[0] || modelData.portfolio.beauty?.[0] || 'https://storage.yandexcloud.net/alexreb/promo.png'}" 
                             alt="${modelData.name}"
                             class="main-photo"
                             onclick="openLightbox('${modelData.portfolio.polaroids?.[0] || modelData.portfolio.beauty?.[0]}')">
                    </div>
                    
                    <div class="model-info">
                        <h1 class="model-name">${modelData.name}</h1>
                        <div class="model-id">
                            <span style="background: rgba(99, 102, 241, 0.2); padding: 8px 16px; border-radius: 20px;">
                                <i class="fas fa-fingerprint"></i> ID: #${modelData.id}
                            </span>
                            <span style="background: rgba(139, 92, 246, 0.2); padding: 8px 16px; border-radius: 20px;">
                                <i class="fab fa-telegram"></i> ${modelData.telegram || 'Не указан'}
                            </span>
                            <span style="background: rgba(236, 72, 153, 0.2); padding: 8px 16px; border-radius: 20px;">
                                <i class="fas fa-ruler-vertical"></i> ${modelData.height} см
                            </span>
                        </div>
                        
                        <div style="margin: 30px 0;">
                            <h3 style="color: #cbd5e1; margin-bottom: 15px;">О модели</h3>
                            <p style="line-height: 1.6; color: #94a3b8;">
                                Профессиональная модель школы. Специализируется на fashion-съемках и коммерческой рекламе.
                                Обладает опытом работы с ведущими фотографами и брендами.
                            </p>
                        </div>
                        
                        <div style="display: flex; gap: 15px; margin-top: 30px;">
                            <button class="btn btn-primary" onclick="downloadPortfolio()">
                                <i class="fas fa-download"></i> Скачать портфолио
                            </button>
                            <button class="btn btn-secondary" onclick="sharePortfolio()">
                                <i class="fas fa-share"></i> Поделиться
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- Статистика -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-value">${modelData.stats.totalPhotos}</span>
                        <span class="stat-label">Всего фото</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value">${modelData.stats.categories.polaroids || 0}</span>
                        <span class="stat-label">Polaroids</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value">${modelData.stats.categories.beauty || 0}</span>
                        <span class="stat-label">Beauty</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value">${modelData.stats.categories.commercial || 0}</span>
                        <span class="stat-label">Commercial</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value">${modelData.grade}/5</span>
                        <span class="stat-label">Рейтинг</span>
                    </div>
                </div>
                
                <!-- Галерея -->
                <div class="gallery-section">
                    <div class="section-header">
                        <h2 class="section-title">
                            <i class="fas fa-images"></i> Галерея портфолио
                        </h2>
                        <div style="color: #94a3b8;">
                            <i class="fas fa-cloud"></i> Яндекс.Облако
                        </div>
                    </div>
                    
                    <!-- Табы категорий -->
                    <div class="category-tabs">
                        <button class="tab-btn ${currentCategory === 'all' ? 'active' : ''}" onclick="filterCategory('all')">
                            <i class="fas fa-th"></i> Все фото (${modelData.stats.totalPhotos})
                        </button>
                        ${modelData.portfolio.polaroids ? `
                            <button class="tab-btn ${currentCategory === 'polaroids' ? 'active' : ''}" onclick="filterCategory('polaroids')">
                                <i class="fas fa-camera"></i> Polaroids (${modelData.stats.categories.polaroids || 0})
                            </button>
                        ` : ''}
                        ${modelData.portfolio.beauty ? `
                            <button class="tab-btn ${currentCategory === 'beauty' ? 'active' : ''}" onclick="filterCategory('beauty')">
                                <i class="fas fa-star"></i> Beauty (${modelData.stats.categories.beauty || 0})
                            </button>
                        ` : ''}
                        ${modelData.portfolio.commercial ? `
                            <button class="tab-btn ${currentCategory === 'commercial' ? 'active' : ''}" onclick="filterCategory('commercial')">
                                <i class="fas fa-briefcase"></i> Commercial (${modelData.stats.categories.commercial || 0})
                            </button>
                        ` : ''}
                    </div>
                    
                    <!-- Сетка фотографий -->
                    <div id="gallery-grid" class="gallery-grid">
                        ${renderGalleryGrid(modelData.portfolio, 'all')}
                    </div>
                </div>
                
                <!-- Информация о папке -->
                <div style="background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 16px; margin-top: 40px; border: 1px solid rgba(255, 255, 255, 0.1);">
                    <h3 style="margin-bottom: 15px; color: #cbd5e1;">
                        <i class="fas fa-folder-open"></i> Структура папки на Яндекс.Облаке
                    </h3>
                    <p style="color: #94a3b8; margin-bottom: 10px;">
                        <strong>Базовая папка:</strong> ${modelData.folder}
                    </p>
                    <p style="color: #94a3b8; font-size: 0.9rem;">
                        Все фото хранятся в облачном хранилище и загружаются напрямую оттуда.
                        Для добавления новых фото просто загрузите их в соответствующую папку на Яндекс.Облаке.
                    </p>
                </div>
            `;
            
            // Обновляем селектор
            document.getElementById('modelSelect').value = modelData.id;
        }
        
        // ==============================================
        // ФИЛЬТРАЦИЯ И ГАЛЕРЕЯ
        // ==============================================
        
        function filterCategory(category) {
            currentCategory = category;
            const galleryGrid = document.getElementById('gallery-grid');
            
            if (!currentModelData) return;
            
            galleryGrid.innerHTML = renderGalleryGrid(currentModelData.portfolio, category);
            
            // Обновляем активные табы
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        function renderGalleryGrid(portfolio, category) {
            let photos = [];
            
            if (category === 'all') {
                Object.keys(portfolio).forEach(cat => {
                    if (Array.isArray(portfolio[cat])) {
                        photos = photos.concat(portfolio[cat].map(url => ({ url, category: cat })));
                    }
                });
            } else if (portfolio[category]) {
                photos = portfolio[category].map(url => ({ url, category }));
            }
            
            if (photos.length === 0) {
                return `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 60px; color: #94a3b8;">
                        <i class="fas fa-image" style="font-size: 3rem; margin-bottom: 20px; opacity: 0.5;"></i>
                        <h3>Нет фото в этой категории</h3>
                        <p>Загрузите фото в соответствующую папку на Яндекс.Облаке</p>
                    </div>
                `;
            }
            
            return photos.map((photo, index) => {
                const fileName = photo.url.split('/').pop();
                const categoryName = getCategoryName(photo.category);
                
                return `
                    <div class="gallery-item" onclick="openLightbox('${photo.url}', ${index + (category === 'all' ? getAllPhotoIndex(portfolio, photo.category, photo.url) : index)})">
                        <img src="${photo.url}" 
                             alt="${categoryName} - ${fileName}"
                             class="gallery-img"
                             onerror="this.src='https://storage.yandexcloud.net/alexreb/promo.png'">
                        <div class="photo-overlay">
                            <div class="photo-info">
                                <span>${categoryName}</span>
                                <span>${fileName}</span>
                            </div>
                        </div>
                        <div class="photo-counter">${index + 1}</div>
                    </div>
                `;
            }).join('');
        }
        
        function getAllPhotoIndex(portfolio, targetCategory, targetUrl) {
            let index = 0;
            for (const category in portfolio) {
                if (Array.isArray(portfolio[category])) {
                    for (const url of portfolio[category]) {
                        if (category === targetCategory && url === targetUrl) {
                            return index;
                        }
                        index++;
                    }
                }
            }
            return 0;
        }
        
        function getCategoryName(category) {
            const names = {
                'polaroids': 'Polaroid',
                'beauty': 'Beauty',
                'commercial': 'Commercial',
                'videos': 'Video'
            };
            return names[category] || category;
        }
        
        // ==============================================
        // LIGHTBOX (ПРОСМОТР ФОТО)
        // ==============================================
        
        function openLightbox(photoUrl, index = 0) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxInfo = document.getElementById('lightbox-info');
            
            // Находим индекс фото в общем массиве
            currentLightboxIndex = lightboxPhotos.findIndex(p => p.url === photoUrl);
            if (currentLightboxIndex === -1) currentLightboxIndex = index;
            
            // Показываем фото
            lightboxImg.src = lightboxPhotos[currentLightboxIndex].url;
            
            // Информация о фото
            const fileName = lightboxPhotos[currentLightboxIndex].url.split('/').pop();
            lightboxInfo.innerHTML = `
                ${getCategoryName(lightboxPhotos[currentLightboxIndex].category)} • 
                ${fileName} • 
                ${currentLightboxIndex + 1} из ${lightboxPhotos.length}
            `;
            
            // Показываем lightbox
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        function prevPhoto() {
            if (currentLightboxIndex > 0) {
                currentLightboxIndex--;
                openLightbox(lightboxPhotos[currentLightboxIndex].url, currentLightboxIndex);
            }
        }
        
        function nextPhoto() {
            if (currentLightboxIndex < lightboxPhotos.length - 1) {
                currentLightboxIndex++;
                openLightbox(lightboxPhotos[currentLightboxIndex].url, currentLightboxIndex);
            }
        }
        
        // Закрытие по ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') prevPhoto();
            if (e.key === 'ArrowRight') nextPhoto();
        });
        
        // ==============================================
        // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
        // ==============================================
        
        function downloadPortfolio() {
            if (!currentModelData) return;
            
            const zipUrl = `https://script.google.com/macros/s/AKfycbzDcvPwakuJcr2E2n7I_r7iGwRutetz1Yn9-DbbHVo5mH19lUvl-CbdHEQLZd3sITVKMA/exec?action=download&id=${currentModelData.id}`;
            window.open(zipUrl, '_blank');
            
            alert('Скачивание портфолио началось. Все фото будут упакованы в ZIP архив.');
        }
        
        function sharePortfolio() {
            if (!currentModelData) return;
            
            const shareUrl = window.location.href.split('?')[0] + `?id=${currentModelData.id}`;
            const shareText = `Портфолио модели ${currentModelData.name} | Школа моделей`;
            
            if (navigator.share) {
                navigator.share({
                    title: shareText,
                    text: `Посмотрите портфолио модели ${currentModelData.name}`,
                    url: shareUrl
                });
            } else {
                // Копируем ссылку в буфер
                navigator.clipboard.writeText(shareUrl)
                    .then(() => alert('Ссылка скопирована в буфер обмена!'));
            }
        }
        
        function refreshData() {
            loadModel(currentModelId);
        }
        
        // ==============================================
        // ЗАГРУЗКА ПРИ СТАРТЕ
        // ==============================================
        
        // Получаем ID модели из URL
        const urlParams = new URLSearchParams(window.location.search);
        const modelIdFromUrl = urlParams.get('id');
        
        document.addEventListener('DOMContentLoaded', () => {
            loadModel(modelIdFromUrl || 1);
        });
    </script>
</body>
</html>
